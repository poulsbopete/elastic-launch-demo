version: "1"
name: __SCENARIO_NAME__ Significant Event Notification (Human in the Loop)
description: >
  Notify launch operations team when a significant event is detected.
  Triggered by alert rules — uses event.rule.tags[1] for the error_type
  search, extracts user_email from event_name, sends email notification
  immediately, then runs AI root cause analysis and creates a case with
  RCA findings.

triggers:
  - type: alert

steps:
  - name: enrich_context
    type: elasticsearch.esql.query
    with:
      query: >
        FROM logs.otel.__NS__,logs.otel.__NS__.* | WHERE KQL("body.text: \"{{ event.rule.tags[1] }}\" AND severity_text: \"ERROR\"") | KEEP event_name
      format: json

  - name: count_errors
    type: elasticsearch.esql.query
    with:
      query: >
        FROM logs.otel.__NS__,logs.otel.__NS__.*
        | WHERE @timestamp > NOW() - 15 MINUTES AND severity_text == "ERROR"
        | STATS total_errors = COUNT(*)
      format: json

  - name: parse_event_meta
    type: data.set
    with:
      var:
        - event_meta: "${{ steps.enrich_context.output.values[1][0] | json_parse }}"

  - name: send_notification
    type: email
    connector-id: Elastic-Cloud-SMTP
    if: "${{ steps.parse_event_meta.output.var[0].event_meta.user_email != '' and steps.parse_event_meta.output.var[0].event_meta.user_email != null }}"
    with:
      to:
        - "{{ steps.parse_event_meta.output.var[0].event_meta.user_email }}"
      subject: "__SCENARIO_NAME__ Alert: {{ event.rule.name }}"
      message: >
        Significant event detected in __SCENARIO_NAME__ mission:

        Rule: {{ event.rule.name }}
        Error Type: {{ event.rule.tags[1] }}
        Total errors (15m): {{ steps.count_errors.output.values[0][0] }}

        An AI root cause analysis is underway — a case with detailed findings will be created shortly.

        Open Kibana to investigate and request remediation:
        __KIBANA_URL__/app/dashboards#/view/__NS__-exec-dashboard

  - name: run_rca
    type: kibana.request
    with:
      method: POST
      path: "/api/agent_builder/converse"
      headers:
        kbn-xsrf: "true"
      body:
        agent_id: __AGENT_ID__
        input: >
          Significant event detected: {{ event.rule.name }}.
          Error type: {{ event.rule.tags[1] }}.
          Total errors in last 15 minutes: {{ steps.count_errors.output.values[0][0] }}.
          Perform a root cause analysis only. Search logs for this error type,
          identify affected services, trace the fault propagation, and provide
          your structured RCA report. Do NOT execute any remediation actions.
    timeout: 10m

  - name: create_case
    type: kibana.createCaseDefaultSpace
    with:
      title: "{{ event.rule.name }}"
      description: |
       [View Full Conversation](/app/agent_builder/conversations/{{ steps.run_rca.output.conversation_id }})

       {{ steps.run_rca.output.response.message }}
      tags:
        - "__NS__"
        - "{{ event.rule.tags[1] }}"
        - "a2a-security-sim"
      severity: "high"
      owner: "observability"
      settings:
        syncAlerts: false
      connector:
        id: "none"
        name: "none"
        type: ".none"
        fields: null

  - name: attach_alert_to_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases/{{ steps.create_case.output.id }}/comments"
      headers:
        kbn-xsrf: "true"
      body:
        type: "alert"
        alertId: "{{ event.alerts[0]._id }}"
        index: "{{ event.alerts[0]._index }}"
        rule:
          id: "{{ event.rule.id }}"
          name: "{{ event.rule.name }}"
        owner: "observability"

  - name: simulated_security_a2a
    type: kibana.request
    with:
      method: POST
      path: "/api/cases/{{ steps.create_case.output.id }}/comments"
      headers:
        kbn-xsrf: "true"
      body:
        type: "user"
        comment: |
          ## Simulated Security enrichment (A2A handoff)

          *Synthetic demo data only — models an **Elastic Security → Observability** agent handoff for the same incident window.*

          | Field | Value |
          | --- | --- |
          | **A2A correlation** | `SEC-A2A-{{ steps.create_case.output.id }}` |
          | **Related rule (sim.)** | Degraded service correlated with `{{ event.rule.tags[1] }}` error family |
          | **Security severity** | medium (noise-adjusted) |
          | **TI / reputation (sim.)** | No high-confidence malicious IOC; no known C2 match for affected `service.name` in last 24h |
          | **Entity posture (sim.)** | Affected entities: **low–medium** risk; no privileged-escalation or lateral-movement *indicators* in the same trace window |
          | **Suggested join keys** | `trace.id`, `service.name`, `host.name` / `cloud.instance.id` (if present in Security indices) |

          **Analyst note:** Use this to *disambiguate* operational fault vs. concurrent security activity. Primary RCA remains the Observability signal; treat this as **enrichment**, not a replacement root cause.
        owner: "observability"

  - name: inject_case_context
    type: kibana.request
    with:
      method: POST
      path: "/api/agent_builder/converse"
      headers:
        kbn-xsrf: "true"
      body:
        agent_id: __AGENT_ID__
        conversation_id: "{{ steps.run_rca.output.conversation_id }}"
        input: >
          Case {{ steps.create_case.output.id }} has been opened to track this incident.
          Do NOT execute any remediation actions.
    timeout: 10m

  - name: audit_log
    type: elasticsearch.index
    with:
      index: "__NS__-significant-events-audit"
      document:
        rule_name: "{{ event.rule.name }}"
        error_type: "{{ event.rule.tags[1] }}"
        total_errors: "{{ steps.count_errors.output.values[0][0] }}"
        rca_case_created: true
        security_a2a_enriched: true
        mission_id: "__SCENARIO_NAME__"
      refresh: wait_for
