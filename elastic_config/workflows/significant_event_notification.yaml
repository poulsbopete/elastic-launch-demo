version: "1"
name: __SCENARIO_NAME__ Significant Event Notification
description: >
  Triggered by alert rules. Runs AI root cause analysis and creates a case.

triggers:
  - type: alert

steps:
  - name: count_errors
    type: elasticsearch.esql.query
    with:
      query: >
        FROM logs.otel,logs.otel.*
        | WHERE @timestamp > NOW() - 15 MINUTES AND severity_text == "ERROR"
        | STATS total_errors = COUNT(*)
      format: json

  - name: run_rca
    type: ai.agent
    agent-id: __AGENT_ID__
    create-conversation: true
    with:
      message: >
        Significant event detected: {{ event.rule.name }}.
        Error type: {{ event.rule.tags[1] }}.
        Total errors in last 15 minutes: {{ steps.count_errors.output.values[0][0] }}.
        Perform a root cause analysis only. Search logs for this error type,
        identify affected services, trace the fault propagation, and provide
        your structured RCA report. Do NOT execute any remediation actions.

  - name: create_case
    type: kibana.request
    with:
      method: POST
      path: /api/cases
      body:
        title: "__SCENARIO_NAME__ RCA: {{ event.rule.name }}"
        description: "{{ steps.run_rca.output.message }}"
        tags:
          - "__NS__"
          - "{{ event.rule.tags[1] }}"
        severity: "high"
        owner: "observability"
        settings:
          syncAlerts: false
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null

  - name: audit_log
    type: elasticsearch.index
    with:
      index: "__NS__-significant-events-audit"
      document:
        rule_name: "{{ event.rule.name }}"
        error_type: "{{ event.rule.tags[1] }}"
        rca_case_created: true
        mission_id: "__SCENARIO_NAME__"
      refresh: wait_for
